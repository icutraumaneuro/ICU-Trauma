<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#0d4f4f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="ICU Trauma">
<meta name="mobile-web-app-capable" content="yes">
<meta name="description" content="ระบบจัดการเตียง ICU Trauma โรงพยาบาลยะลา">

<!-- PWA Manifest -->
<link rel="manifest" href="manifest.json">

<!-- Apple Touch Icons -->
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" sizes="152x152" href="icons/icon-192.png">
<link rel="apple-touch-icon" sizes="180x180" href="icons/icon-192.png">
<link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">

<title>ICU Trauma Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* ============ RESET & BASE ============ */
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:Sarabun,sans-serif;background:#f0f7f7;color:#1a3a3a;font-size:15px;display:flex;flex-direction:column}

/* ============ OFFLINE BANNER ============ */
.offline-bar{background:#e06464;color:white;text-align:center;font-size:12px;font-weight:700;padding:5px;flex-shrink:0;display:none}
.offline-bar.show{display:block}

/* ============ HEADER ============ */
.hdr{background:linear-gradient(135deg,#0d4f4f 0%,#1a6b6b 60%,#2a9d8f 100%);padding:10px 16px;flex-shrink:0;box-shadow:0 3px 14px rgba(13,79,79,.35)}
.hr{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.hico{width:42px;height:42px;background:rgba(255,255,255,.15);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:24px;border:1px solid rgba(255,255,255,.25)}
.htitle{color:white;font-weight:800;font-size:22px;letter-spacing:.2px}
.hsub{color:#a8ddd8;font-size:13px}
.hright{margin-left:auto;display:flex;gap:6px;align-items:center}
.hlbtn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.3);color:white;border-radius:8px;padding:8px 14px;font-size:14px;font-weight:700;cursor:pointer;font-family:Sarabun,sans-serif;touch-action:manipulation}

/* ============ STATS ============ */
.stats{display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px}
.stats::-webkit-scrollbar{display:none}
.stat{border-radius:12px;padding:8px 14px;display:flex;align-items:center;gap:8px;flex-shrink:0;background:white;border:none}
.stat-num{font-size:28px;font-weight:900;font-family:monospace;line-height:1;color:#0d4f4f}
.stat-lbl{font-size:13px;font-weight:700;line-height:1.3;color:#2a9d8f}

/* ============ QUOTA BAR ============ */
.quota-bar{display:flex;gap:8px;padding:10px 12px;background:#0d4f4f;border-bottom:2px solid #1a6b6b;flex-shrink:0}
.quota-item{flex:1;border-radius:10px;padding:10px 12px;border:1.5px solid}
.quota-sx{background:rgba(255,255,255,.07);border-color:rgba(77,184,172,.4)}
.quota-neuro{background:rgba(233,196,106,.08);border-color:rgba(233,196,106,.4)}
.quota-label{font-size:14px;font-weight:800;margin-bottom:5px}
.quota-sx .quota-label{color:#a8ddd8}
.quota-neuro .quota-label{color:#e9c46a}
.quota-track{height:10px;border-radius:99px;overflow:hidden}
.quota-sx .quota-track{background:rgba(255,255,255,.1)}
.quota-neuro .quota-track{background:rgba(233,196,106,.15)}
.quota-fill{height:100%;border-radius:99px;transition:width .4s}
.quota-sx .quota-fill{background:#4db8ac}
.quota-neuro .quota-fill{background:#e9c46a}
.quota-count{font-size:15px;font-weight:800;margin-top:5px}
.quota-sx .quota-count{color:#e0f5f3}
.quota-neuro .quota-count{color:#fde68a}

/* ============ TABS ============ */
.tabs{display:flex;background:#0d4f4f;border-bottom:2px solid #1a6b6b;flex-shrink:0}
.tab{flex:1;padding:11px 4px;background:none;border:none;border-bottom:3px solid transparent;color:rgba(255,255,255,.45);font-weight:600;font-size:13px;cursor:pointer;font-family:Sarabun,sans-serif;touch-action:manipulation}
.tab.on{border-bottom-color:#4db8ac;color:#4db8ac;font-weight:800}

.main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 12px 80px}

/* ============ BED CARDS ============ */
.bed-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.bed-card{border-radius:16px;padding:14px;position:relative;cursor:pointer;transition:all .15s;touch-action:manipulation;border:none;box-shadow:0 2px 10px rgba(0,0,0,.08)}
.bed-card:active{transform:scale(.97)}
.bed-card.type-sx{background:linear-gradient(145deg,#f8fafb,#edf1f3);border-left:5px solid #94a3b8}
.bed-card.type-neuro{background:linear-gradient(145deg,#fffdf0,#fef8d8);border-left:5px solid #e9c46a}
.bed-card.empty-bed{background:linear-gradient(145deg,#f4fdf9,#e6f7f0);border-left:5px solid #4db8ac}
.bed-badge{position:absolute;top:10px;right:8px;font-size:10px;font-weight:800;padding:3px 8px;border-radius:99px}
.badge-sx{background:#f1f5f9;color:#475569;border:1px solid #cbd5e1}
.badge-neuro{background:#fef9c3;color:#854d0e;border:1px solid #e9c46a}
.bed-num{font-size:16px;font-weight:900;color:#1a6b6b;margin-bottom:8px;letter-spacing:.5px}
.bed-icon{font-size:32px;margin-bottom:8px}
.bed-status{font-size:12px;font-weight:800;padding:4px 11px;border-radius:99px;display:inline-block;margin-bottom:8px;background:white}
.bed-status-admit{color:#c04040}
.bed-card.empty-bed .bed-status{color:#2a9d8f}
.bed-patient{font-weight:800;font-size:15px;line-height:1.4;margin-bottom:5px;color:#0d3a3a}
.bed-doctor{font-size:13px;color:#4a7070;margin-bottom:4px}
.bed-dx{font-size:13px;color:#1a6b6b;font-weight:700;margin-bottom:3px;line-height:1.4}
.bed-op{font-size:12px;color:#8a5a10;font-weight:600;line-height:1.4}
.bed-empty-txt{font-size:15px;color:#2a9d8f;font-weight:700;margin-top:6px}

/* ============ QUEUE ============ */
.bookbtn{display:block;width:100%;padding:14px;border-radius:14px;border:none;background:linear-gradient(135deg,#1a6b6b,#2a9d8f);color:white;font-size:16px;font-weight:800;cursor:pointer;font-family:Sarabun,sans-serif;margin-bottom:12px;box-shadow:0 4px 16px rgba(42,157,143,.3);touch-action:manipulation}
.filters{display:flex;gap:6px;margin-bottom:12px;flex-wrap:wrap}
.fb{padding:6px 12px;border-radius:99px;border:1.5px solid #b2e0da;background:white;color:#2a9d8f;font-size:12px;font-weight:700;cursor:pointer;font-family:Sarabun,sans-serif;touch-action:manipulation}
.fb.on{background:#2a9d8f;border-color:#2a9d8f;color:white}
.qcard{background:white;border-radius:14px;padding:12px 14px;margin-bottom:8px;border:1px solid #d4eeec;border-left:4px solid;box-shadow:0 1px 6px rgba(13,79,79,.06)}
.badge{padding:4px 10px;border-radius:99px;font-size:11px;font-weight:800;white-space:nowrap}
.sbtn{padding:5px 10px;border-radius:8px;border:none;font-size:11px;font-weight:700;cursor:pointer;font-family:Sarabun,sans-serif;touch-action:manipulation}
.dhdr{border-radius:12px;padding:10px 12px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.nd{text-align:center;padding:40px;color:#6aacaa;font-size:14px}

/* ============ OVERLAYS ============ */
.ov{position:fixed;inset:0;background:rgba(13,79,79,.4);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.sh{background:white;border-radius:24px 24px 0 0;width:100%;max-width:520px;max-height:92vh;overflow-y:auto;-webkit-overflow-scrolling:touch;overscroll-behavior:contain}
.hdl{width:40px;height:4px;background:#d4eeec;border-radius:99px;margin:14px auto 0}
.sp{padding:14px 20px 40px}
.fl{font-size:13px;font-weight:700;color:#2a9d8f;margin-bottom:5px;display:block;margin-top:12px}
.fi{width:100%;padding:12px 13px;border-radius:10px;border:1.5px solid #d4eeec;font-size:15px;font-family:Sarabun,sans-serif;background:white;outline:none;color:#0d3a3a}
.fi:focus{border-color:#2a9d8f}
.ferr{display:none;background:#fef2f2;border:1px solid #fca5a5;border-radius:10px;padding:9px 13px;font-size:13px;color:#dc2626;font-weight:700;margin-top:10px}
.subbtn{width:100%;padding:14px;border-radius:12px;border:none;background:linear-gradient(135deg,#1a6b6b,#2a9d8f);color:white;font-size:15px;font-weight:800;cursor:pointer;font-family:Sarabun,sans-serif;margin-top:14px;touch-action:manipulation}
.canbtn{width:100%;padding:12px;border-radius:12px;border:1.5px solid #d4eeec;background:#f4fbfb;color:#2a9d8f;font-size:14px;font-weight:700;cursor:pointer;font-family:Sarabun,sans-serif;margin-top:8px;touch-action:manipulation}
.delbtn{width:100%;padding:12px;border-radius:12px;border:1.5px solid #ef4444;background:transparent;color:#ef4444;font-size:14px;font-weight:800;cursor:pointer;font-family:Sarabun,sans-serif;margin-top:8px;touch-action:manipulation}
.warn{background:#fdf6e3;border:1px solid #e9c46a;border-radius:10px;padding:10px 13px;font-size:13px;color:#8a6a10;margin-top:10px}
.fr2{display:flex;gap:10px}
.drow{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid #edf7f6}
.dk{color:#6aacaa;font-size:13px}
.dv{font-weight:700;font-size:13px;text-align:right;max-width:60%;color:#0d3a3a}
.bedsel{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.bselbtn{width:54px;height:54px;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:11px;font-weight:800;border:2px solid;font-family:Sarabun,sans-serif;line-height:1.4;touch-action:manipulation;cursor:pointer}
.bedtype-toggle{display:flex;gap:8px;margin-top:8px}
.bt-btn{flex:1;padding:12px 8px;border-radius:12px;border:2px solid;font-size:13px;font-weight:800;cursor:pointer;font-family:Sarabun,sans-serif;text-align:center;transition:all .15s;touch-action:manipulation}
.bt-sx{background:#f4fbfb;border-color:#b2e0da;color:#2a9d8f}
.bt-sx.sel{background:#2a9d8f;border-color:#2a9d8f;color:white}
.bt-neuro{background:#fdf6e3;border-color:#e9c46a;color:#8a6a10}
.bt-neuro.sel{background:#e9c46a;border-color:#c4a010;color:#3a2a00}
.qpick{padding:12px 14px;border-radius:12px;cursor:pointer;border:2px solid #d4eeec;background:#f4fbfb;margin-bottom:8px}
.qpick.sel{border-color:#2a9d8f;background:#e6f6f4}
.divider{display:flex;align-items:center;gap:8px;margin:14px 0}
.divline{flex:1;height:1px;background:#d4eeec}
.divtxt{font-size:12px;color:#6aacaa;font-weight:600}
#detbg{position:fixed;inset:0;background:rgba(13,79,79,.4);z-index:300;display:none}
#detsheet{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:520px;max-height:92vh;overflow-y:auto;background:white;border-radius:24px 24px 0 0;z-index:301;transition:transform .3s ease;overscroll-behavior:contain;-webkit-overflow-scrolling:touch}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#0d4f4f;color:white;padding:11px 20px;border-radius:12px;font-size:13px;font-weight:700;transition:transform .3s cubic-bezier(.34,1.56,.64,1);z-index:9999;white-space:nowrap;pointer-events:none;max-width:90vw}
.toast.s{transform:translateX(-50%) translateY(0)}

/* ============ PWA INSTALL PROMPT ============ */
.install-prompt{display:none;position:fixed;bottom:80px;left:12px;right:12px;background:#0d4f4f;color:white;border-radius:16px;padding:14px 16px;z-index:500;box-shadow:0 8px 24px rgba(13,79,79,.4)}
.install-prompt.show{display:flex;align-items:center;gap:12px}
</style>
</head>
<body>

<!-- Offline Banner -->
<div class="offline-bar" id="offline-bar">📵 ออฟไลน์ — แสดงข้อมูลล่าสุดที่มี</div>

<div class="hdr">
  <div class="hr">
    <div class="hico">🏥</div>
    <div>
      <div class="htitle">ICU Trauma — ยะลา</div>
      <div class="hsub" id="upd">กำลังโหลด...</div>
    </div>
    <div class="hright">
      <button class="hlbtn" onclick="showRules()" style="font-size:12px">📋</button>
      <div id="auth-area"><button class="hlbtn" onclick="showLogin()">🔐 Login</button></div>
    </div>
  </div>
  <div class="stats">
    <div class="stat"><span class="stat-num" id="s-free">-</span><span class="stat-lbl">🟢 ว่าง</span></div>
    <div class="stat"><span class="stat-num" id="s-used">-</span><span class="stat-lbl">🔴 Admit</span></div>
    <div class="stat"><span class="stat-num" id="s-conf">-</span><span class="stat-lbl">✅ ได้เตียง</span></div>
    <div class="stat"><span class="stat-num" id="s-wait">-</span><span class="stat-lbl">🕐 รอยืนยัน</span></div>
  </div>
</div>

<div class="quota-bar">
  <div class="quota-item quota-sx">
    <div class="quota-label">⬜ โควต้า Sx</div>
    <div class="quota-track"><div class="quota-fill" id="qfill-sx" style="width:0%"></div></div>
    <div class="quota-count" id="qcount-sx">0 / 6</div>
  </div>
  <div class="quota-item quota-neuro">
    <div class="quota-label">🟨 โควต้า Neuro Sx</div>
    <div class="quota-track"><div class="quota-fill" id="qfill-neuro" style="width:0%"></div></div>
    <div class="quota-count" id="qcount-neuro">0 / 2</div>
  </div>
</div>

<div class="tabs">
  <button class="tab on" id="tt-bed" onclick="setTab('bed')">🛏️ Bed Map</button>
  <button class="tab" id="tt-queue" onclick="setTab('queue')">📋 คิวจองเตียง</button>
</div>

<div class="main">
  <div id="sec-bed">
    <div id="admit-top" style="margin-bottom:12px"></div>
    <div class="bed-grid" id="bed-grid"></div>
  </div>
  <div id="sec-queue" style="display:none">
    <button class="bookbtn" onclick="showBook()">🛏️+  จองเตียง ICU Trauma</button>
    <div class="filters">
      <button class="fb on" onclick="setFi('all',this)">ทั้งหมด</button>
      <button class="fb" onclick="setFi('รอยืนยัน',this)">🕐 รอยืนยัน</button>
      <button class="fb" onclick="setFi('ได้เตียง',this)">✅ ได้เตียง</button>
      <button class="fb" onclick="setFi('เต็ม',this)">❌ เต็ม</button>
      <button class="fb" onclick="setFi('ยกเลิก',this)">🚫 ยกเลิก</button>
    </div>
    <div id="queue-list"></div>
  </div>
</div>

<!-- PWA Install Prompt -->
<div class="install-prompt" id="install-prompt">
  <div style="font-size:24px">📲</div>
  <div style="flex:1">
    <div style="font-weight:800;font-size:14px">เพิ่มเป็นแอพ</div>
    <div style="font-size:12px;color:#a8ddd8;margin-top:2px">ใช้งานได้ offline</div>
  </div>
  <button onclick="installPWA()" style="background:#4db8ac;border:none;color:white;border-radius:8px;padding:8px 14px;font-weight:800;font-size:13px;cursor:pointer;font-family:Sarabun,sans-serif">ติดตั้ง</button>
  <button onclick="dismissInstall()" style="background:rgba(255,255,255,.15);border:none;color:white;border-radius:8px;padding:8px;cursor:pointer;margin-left:4px">✕</button>
</div>

<div id="detbg" onclick="closeDet()"></div>
<div id="detsheet"><div class="hdl"></div><div id="detcontent" style="padding:14px 20px 40px"></div></div>
<div class="toast" id="toast"></div>

<script>
// ==========================================
// ⚠️ แก้ URL นี้ให้เป็น Apps Script URL ของคุณ
// ==========================================
var API = 'https://script.google.com/macros/s/AKfycby9Xzxec0hYDzzBuh8OvJtDTwPxi2iyYK8P_JiheOVAdhjGggjfdT3jOVAQcLr8zP5QGw/exec';

var WARDS = ["ศัลยกรรมชาย","ศัลยกรรมหญิงและเด็ก","ศัลยกรรมประสาท","ศัลยกรรมกระดูก","Burn","พิเศษชั้น 10","Premium ชั้น 4","Premium ชั้น 5","ER (Emergency)"];
var ICU_USER='icut1', ICU_PASS='8504';
var BEDS=8, QUOTA_SX=6, QUOTA_NEURO=2;
var isICU=false, qs=[], admitted=[], totB=BEDS, fi='all';
var DA=['อา','จ','อ','พ','พฤ','ศ','ส'];
var MO=['ม.ค.','ก.พ.','มี.ค.','เม.ย.','พ.ค.','มิ.ย.','ก.ค.','ส.ค.','ก.ย.','ต.ค.','พ.ย.','ธ.ค.'];
var SC={'ได้เตียง':{bg:'#e6f6f4',tc:'#1a6b6b',dot:'#2a9d8f',ic:'✅'},'รอยืนยัน':{bg:'#fdf6e3',tc:'#8a6a10',dot:'#e9c46a',ic:'🕐'},'เต็ม':{bg:'#fee8e8',tc:'#c04040',dot:'#e06464',ic:'❌'},'ยกเลิก':{bg:'#f4fbfb',tc:'#6aacaa',dot:'#a8ddd8',ic:'🚫'}};

// ==========================================
// PWA — Register Service Worker
// ==========================================
if('serviceWorker' in navigator){
  window.addEventListener('load', function(){
    navigator.serviceWorker.register('./sw.js')
      .then(function(reg){ console.log('[PWA] SW registered:', reg.scope); })
      .catch(function(e){ console.warn('[PWA] SW failed:', e); });
    // รับข้อความจาก SW
    navigator.serviceWorker.addEventListener('message', function(e){
      if(e.data && e.data.type==='SYNC_DATA') load();
    });
  });
}

// Online/Offline detection
window.addEventListener('online', function(){
  document.getElementById('offline-bar').classList.remove('show');
  toast('🌐 กลับมา online แล้ว');
  load();
});
window.addEventListener('offline', function(){
  document.getElementById('offline-bar').classList.add('show');
  toast('📵 ออฟไลน์ — ใช้ข้อมูล cache');
});
if(!navigator.onLine) document.getElementById('offline-bar').classList.add('show');

// PWA Install
var deferredPrompt = null;
window.addEventListener('beforeinstallprompt', function(e){
  e.preventDefault();
  deferredPrompt = e;
  document.getElementById('install-prompt').classList.add('show');
});
window.addEventListener('appinstalled', function(){
  document.getElementById('install-prompt').classList.remove('show');
  toast('✅ ติดตั้งแอพสำเร็จ!');
});
function installPWA(){
  if(!deferredPrompt) return;
  deferredPrompt.prompt();
  deferredPrompt.userChoice.then(function(r){
    if(r.outcome==='accepted') toast('✅ ติดตั้งแอพสำเร็จ!');
    deferredPrompt=null;
    document.getElementById('install-prompt').classList.remove('show');
  });
}
function dismissInstall(){ document.getElementById('install-prompt').classList.remove('show'); }

// ==========================================
// HELPERS
// ==========================================
function thD(s){if(!s||s==='-')return'-';var p=s.split('/');if(p.length!==3)return s;var dt=new Date(parseInt(p[2]),parseInt(p[1])-1,parseInt(p[0]));return DA[dt.getDay()]+' '+p[0]+' '+MO[parseInt(p[1])-1]+' '+(parseInt(p[2])+543);}
function toISO(s){var p=s.split('/');return p.length===3?p[2]+'-'+p[1]+'-'+p[0]:s;}
var todayISO=new Date().toISOString().split('T')[0];
function maskName(n){if(!n||n==='-')return'-';var p=n.trim().split(' ');var pre=['นาย','นาง','นางสาว','เด็กชาย','เด็กหญิง','ด.ช.','ด.ญ.'];var px='',r=p;for(var i=0;i<pre.length;i++){if(p[0]===pre[i]){px=p[0]+' ';r=p.slice(1);break;}}if(r.length===1)return px+r[0];var ln=r[r.length-1];return px+r.slice(0,-1).join(' ')+' '+ln.substring(0,Math.max(1,Math.ceil(ln.length/2)))+'***';}
function maskHN(h){if(!h||h==='-')return'-';var s=String(h);return s.length<=3?s:s.substring(0,Math.ceil(s.length/2))+'***';}

// ==========================================
// DATA LOAD
// ==========================================
load();
setInterval(load, 30000);

function load(){
  fetch(API+'?action=getData')
    .then(function(r){return r.json();})
    .then(function(d){
      if(d.offline){ toast('📵 ใช้ข้อมูล offline'); }
      qs=d.queues||[]; totB=d.beds||BEDS; admitted=d.admitted||[];
      document.getElementById('upd').textContent='อัปเดต: '+(d.updated||'-');
      renderAll();
    })

  document.getElementById('s-wait').textContent=qs.filter(function(q){return q.status==='รอยืนยัน';}).length;
  document.getElementById('qfill-sx').style.width=Math.min(100,Math.round(usedSx/QUOTA_SX*100))+'%';
  document.getElementById('qcount-sx').textContent=usedSx+' / '+QUOTA_SX+' เตียง';

function showBedDetail(bed){
  var pt=admitted.find(function(a){return a.bed===bed;});if(!pt)return;
  var isNeuro=(pt.bedType==='neuro');
  var ac=isNeuro?'#c4a010':'#2a9d8f';
  var name=isICU?(pt.patient||'-'):maskName(pt.patient||'-');
  var hn=pt.hn?(isICU?pt.hn:maskHN(pt.hn)):'';
  var rows=[['🛏️ เตียง',bed],['🏷️ ประเภท',isNeuro?'🟨 Neuro Sx':'⬜ Sx'],['👤 ผู้ป่วย',name]];
  if(hn)rows.push(['🏷️ HN',hn]);
  rows.push(['🏢 Ward',pt.ward||'-']);
  if(pt.doc)rows.push(['👨‍⚕️ แพทย์',pt.doc]);
  if(pt.dx)rows.push(['🩻 Diagnosis',pt.dx]);
  if(pt.op)rows.push(['⚕️ Operation',pt.op]);
  rows.push(['📅 Admit',pt.admitDate||'-']);
  var h='<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px">';
  h+='<div style="width:50px;height:50px;background:'+(isNeuro?'#fef9c3':'#f1f5f9')+';border:2px solid '+ac+';border-radius:14px;display:flex;flex-direction:column;align-items:center;justify-content:center"><div style="font-size:20px">🛏️</div><div style="font-size:9px;font-weight:800;color:'+ac+'">'+bed+'</div></div>';
  h+='<div><div style="font-weight:800;font-size:18px;color:#0d3a3a">'+name+'</div>';
  h+='<div style="font-size:12px;color:#6aacaa;margin-top:2px">'+(pt.ward||'-')+'</div>';
  h+='<span style="background:'+(isNeuro?'#fef9c3':'#f1f5f9')+';color:'+ac+';border-radius:99px;padding:2px 9px;font-size:11px;font-weight:800">'+(isNeuro?'🟨 Neuro Sx':'⬜ Sx')+'</span></div></div>';
  rows.forEach(function(r){h+='<div class="drow"><span class="dk">'+r[0]+'</span><span class="dv">'+r[1]+'</span></div>';});
  if(isICU)h+='<button class="delbtn" style="margin-top:16px" onclick="doDischarge(\''+pt.id+'\')">🏠 Discharge — คืนเตียง</button>';
  h+='<button class="canbtn" onclick="closeDet()">ปิด</button>';
  document.getElementById('detcontent').innerHTML=h;
  document.getElementById('detbg').style.display='block';
  document.getElementById('detsheet').style.transform='translateX(-50%) translateY(0)';
  document.body.style.overflow='hidden';
}

function doDischarge(id){
  if(!confirm('Discharge ผู้ป่วยออกจาก ICU?\nเตียงจะว่างทันที'))return;
  closeDet();
  fetch(API+'?action=dischargePatient&id='+encodeURIComponent(id))
    .then(function(r){return r.json();})
    .then(function(res){if(res.ok){toast('🏠 Discharge แล้ว');load();}else toast('❌ เกิดข้อผิดพลาด');});
}
function showAdmitBed(b){window._preBed=b||null;showAdmitForm();}

function renderQueues(){
  var el=document.getElementById('queue-list');
  var list=fi==='all'?qs:qs.filter(function(q){return q.status===fi;});
  if(!list.length){el.innerHTML='<div class="nd">ไม่มีรายการ</div>';return;}
  var grouped={};list.forEach(function(q){if(!grouped[q.date])grouped[q.date]=[];grouped[q.date].push(q);});
  var dates=Object.keys(grouped).sort(function(a,b){return toISO(a).localeCompare(toISO(b));});
  el.innerHTML=dates.map(function(date){
    var dq=grouped[date];
    var isToday=toISO(date)===todayISO;var isPast=toISO(date)<todayISO;
    var conf=dq.filter(function(q){return q.status==='ได้เตียง';}).length;
    var wait=dq.filter(function(q){return q.status==='รอยืนยัน';}).length;
    var hdr='<div class="dhdr" style="background:#e6f6f4;border:1px solid #b2e0da"><span style="font-size:18px">📅</span><div style="flex:1"><div style="font-weight:800;font-size:14px;color:#1a6b6b">'+thD(date)+(isToday?' <span style="background:#2a9d8f;border-radius:99px;padding:1px 8px;font-size:10px;font-weight:700;color:white">วันนี้</span>':'')+(isPast?' <span style="background:#f1f5f9;border-radius:99px;padding:1px 8px;font-size:10px;color:#6aacaa">ผ่านแล้ว</span>':'')+'</div><div style="font-size:11px;color:#6aacaa;margin-top:2px">'+dq.length+' ราย · ✅ '+conf+' · 🕐 '+wait+'</div></div><div style="background:#2a9d8f;border-radius:8px;padding:3px 10px;font-size:12px;font-weight:800;color:white">'+dq.length+'</div></div>';
    var cards=dq.map(function(q,i){
      var sc=SC[q.status]||SC['รอยืนยัน'];
      var pname=isICU?q.patient:maskName(q.patient);
      var icuBtns=isICU&&!isPast?['ได้เตียง','รอยืนยัน','เต็ม','ยกเลิก'].map(function(s){var cs=SC[s];var ac=q.status===s;return'<button class="sbtn" onclick="chg('+q.row+',\''+s+'\')" style="background:'+(ac?cs.dot:'#f4fbfb')+';color:'+(ac?'white':cs.tc)+'">'+cs.ic+' '+s+'</button>';}).join(''):'' ;
      var c='<div class="qcard" style="border-left-color:'+sc.dot+';opacity:'+(isPast?0.6:1)+'">';
      c+='<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px"><div style="flex:1;padding-right:8px"><div style="font-weight:800;font-size:14px;color:#0d3a3a;display:flex;align-items:center;gap:6px"><span style="background:#e6f6f4;color:#2a9d8f;border-radius:6px;padding:1px 7px;font-size:11px;font-weight:800">'+(i+1)+'</span>'+pname+'</div><div style="font-size:12px;color:#6aacaa;margin-top:2px">'+q.ward+'</div></div><span class="badge" style="background:'+sc.bg+';color:'+sc.tc+'">'+sc.ic+' '+q.status+'</span></div>';
      if(q.dx)c+='<div style="font-size:12px;color:#2a9d8f;font-weight:600;margin-bottom:2px">🩻 '+q.dx+'</div>';
      if(q.op)c+='<div style="font-size:12px;color:#8a5a10;font-weight:600;margin-bottom:3px">⚕️ '+q.op+'</div>';
      c+='<div style="font-size:11px;color:#6aacaa;margin-bottom:'+(icuBtns?'8px':'0')+'">⏰ '+q.time+' · ✍️ '+q.book+'</div>';
      if(icuBtns)c+='<div style="display:flex;gap:5px;flex-wrap:wrap">'+icuBtns+'</div>';
      if(!isPast&&q.status!=='ยกเลิก')c+='<button onclick="wardCancel('+q.row+')" style="width:100%;padding:7px;border-radius:9px;border:1.5px solid #2a9d8f;background:rgba(42,157,143,.06);color:#2a9d8f;font-size:12px;font-weight:700;cursor:pointer;font-family:Sarabun,sans-serif;margin-top:7px">🚫 ขอยกเลิกการจอง</button>';
      c+='</div>';return c;
    }).join('');
    return hdr+cards;
  }).join('');
}

function chg(row,status){

    .then(function(r){return r.json();})
    .then(function(){toast((SC[status]||SC['รอยืนยัน']).ic+' อัปเดต → '+status);load();})
    .catch(function(){toast('❌ เกิดข้อผิดพลาด');});
}
function wardCancel(row){if(!confirm('ยืนยันการยกเลิกการจอง?'))return;chg(row,'ยกเลิก');}

function showAdmitForm(){
  var preBed=window._preBed||null;

  var warnSx=usedSx>=QUOTA_SX?'<div class="warn">⚠️ โควต้า Sx เต็มแล้ว ('+usedSx+'/'+QUOTA_SX+')</div>':'';

  var h='<div class="hdl"></div><div class="sp">';

function selBedType(t){window._selBedType=t;var bs=document.getElementById('btn-sx');var bn=document.getElementById('btn-neuro');if(bs)bs.className='bt-btn bt-sx'+(t==='sx'?' sel':'');if(bn)bn.className='bt-btn bt-neuro'+(t==='neuro'?' sel':'');}
function selBed(btn){document.querySelectorAll('.bselbtn').forEach(function(el){if(!el.disabled){el.style.background='white';el.style.borderColor='#4db8ac';el.style.color='#2a9d8f';}});window._selBed=btn.getAttribute('data-b');btn.style.background='#2a9d8f';btn.style.borderColor='#2a9d8f';btn.style.color='white';}
function tgAW(){var s=document.getElementById('af-ward');var c=document.getElementById('af-ward-other');if(c)c.style.display=s&&s.value==='อื่นๆ'?'block':'none';}
function pickQ(el){var row=parseInt(el.getAttribute('data-row'));var q=qs.find(function(x){return x.row===row;});if(!q)return;if(window._selQrow){var op=document.getElementById('qp-'+window._selQrow);if(op)op.className='qpick';var oc=document.getElementById('chk-'+window._selQrow);if(oc)oc.style.display='none';}window._selQrow=row;el.className='qpick sel';var chk=document.getElementById('chk-'+row);if(chk)chk.style.display='block';document.getElementById('af-name').value=q.patient||'';document.getElementById('af-hn').value=q.hn||'';document.getElementById('af-dx').value=q.dx||'';document.getElementById('af-op').value=q.op||'';document.getElementById('af-ward').value=q.ward||'';tgAW();}
function submitAdmit(){
  var bed=window._selBed;var name=(document.getElementById('af-name').value||'').trim();
  var ward=document.getElementById('af-ward').value;if(ward==='อื่นๆ')ward=(document.getElementById('af-ward-other').value||'').trim()||'อื่นๆ';
  var err=document.getElementById('af-err');
  if(!bed||!name||!ward){err.textContent='❗ กรุณาเลือกเตียง กรอกชื่อ และเลือก Ward';err.style.display='block';return;}
  err.style.display='none';var sb=document.querySelector('.subbtn');if(sb){sb.textContent='กำลังบันทึก...';sb.disabled=true;}
  var today=new Date();var admitDate=String(today.getDate()).padStart(2,'0')+'/'+String(today.getMonth()+1).padStart(2,'0')+'/'+today.getFullYear();
  var params=new URLSearchParams({action:'admitPatient',bed:bed,patient:name,hn:(document.getElementById('af-hn').value||'').trim(),dx:(document.getElementById('af-dx').value||'').trim(),op:(document.getElementById('af-op').value||'').trim(),doc:(document.getElementById('af-doc').value||'').trim(),ward:ward,admitDate:admitDate,bedType:window._selBedType||'sx',qrow:window._selQrow||''});
  fetch(API+'?'+params.toString()).then(function(r){return r.json();}).then(function(res){if(res.ok){toast('🏥 Admit แล้ว — เตียง '+bed);closeOv();window._preBed=null;load();}else{err.textContent='❌ '+(res.err||'เกิดข้อผิดพลาด');err.style.display='block';if(sb){sb.textContent='✅ Admit ผู้ป่วย';sb.disabled=false;}}}).catch(function(){err.textContent='❌ Network error';err.style.display='block';if(sb){sb.textContent='✅ Admit ผู้ป่วย';sb.disabled=false;}});
}

  h+='<label class="fl">🏷️ HN</label><input class="fi" id="fh" placeholder="Hospital Number">';
  h+='<div class="fr2"><div style="flex:1"><label class="fl">อายุ</label><input class="fi" id="fa" type="number" placeholder="ปี"></div><div style="flex:1"><label class="fl">เพศ</label><select class="fi" id="fg"><option>ชาย</option><option>หญิง</option></select></div></div>';
  h+='<label class="fl">🩺 แพทย์</label><input class="fi" id="fd" placeholder="ชื่อแพทย์">';
  h+='<label class="fl">🩻 Diagnosis</label><input class="fi" id="fdx" placeholder="เช่น TBI">';
  h+='<label class="fl">⚕️ Operation</label><input class="fi" id="fo" placeholder="ปล่อยว่างได้">';
  h+='<div class="fr2"><div style="flex:2"><label class="fl">📅 วันที่ผ่าตัด *</label><input class="fi" id="fd2" type="date"></div><div style="flex:1"><label class="fl">⏰ เวลา</label><input class="fi" id="ft" type="time"></div></div>';
  h+='<label class="fl">✍️ ชื่อผู้จอง *</label><input class="fi" id="fb2" placeholder="ชื่อพยาบาลผู้จอง">';
  h+='<label class="fl">📌 หมายเหตุ</label><textarea class="fi" id="fn" rows="2" style="resize:none" placeholder="ข้อมูลเพิ่มเติม"></textarea>';
  h+='<div class="ferr" id="fe"></div>';
  h+='<button class="subbtn" onclick="subB()">✅ จองเตียง + แจ้ง LINE</button><button class="canbtn" onclick="closeOv()">ยกเลิก</button></div>';
  openOv(h);
}
function tgW(){var s=document.getElementById('fw');var c=document.getElementById('fwc');if(c)c.style.display=s&&s.value==='อื่นๆ'?'block':'none';}
function subB(){
  var w=document.getElementById('fw').value;if(w==='อื่นๆ')w=(document.getElementById('fwc').value||'').trim()||'อื่นๆ';
  var p=(document.getElementById('fp').value||'').trim();var d=document.getElementById('fd2').value;var b=(document.getElementById('fb2').value||'').trim();var fe=document.getElementById('fe');
  if(!w||!p||!d||!b){fe.textContent='❗ กรุณากรอกข้อมูลที่ * ให้ครบ';fe.style.display='block';return;}
  fe.style.display='none';var sb=document.querySelector('.subbtn');if(sb){sb.textContent='กำลังบันทึก...';sb.disabled=true;}
  var pm=new URLSearchParams({action:'addQueue',ward:w,patient:p,date:d,booker:b,hn:document.getElementById('fh').value||'',age:document.getElementById('fa').value||'',gender:document.getElementById('fg').value||'ชาย',doctor:document.getElementById('fd').value||'',dx:document.getElementById('fdx').value||'',op:document.getElementById('fo').value||'',time:document.getElementById('ft').value||'',note:document.getElementById('fn').value||''});
  fetch(API+'?'+pm.toString()).then(function(r){return r.json();}).then(function(res){if(res.ok){toast('✅ จองสำเร็จ! แจ้ง LINE แล้ว');closeOv();load();}else{fe.textContent='❌ เกิดข้อผิดพลาด';fe.style.display='block';if(sb){sb.textContent='✅ จองเตียง + แจ้ง LINE';sb.disabled=false;}}}).catch(function(){fe.textContent='❌ Network error';fe.style.display='block';if(sb){sb.textContent='✅ จองเตียง + แจ้ง LINE';sb.disabled=false;}});
}

function showLogin(){
  var h='<div class="hdl"></div><div class="sp" style="text-align:center">';
  h+='<div style="font-size:44px;margin-bottom:8px">🔐</div>';
  h+='<div style="font-weight:800;font-size:20px;color:#0d3a3a">ICU Nurse Login</div>';
  h+='<div style="font-size:13px;color:#6aacaa;margin:5px 0 16px">เฉพาะพยาบาล ICU Trauma เท่านั้น</div>';
  h+='<div id="login-err" style="color:#c04040;font-size:13px;font-weight:700;min-height:20px;margin-bottom:8px"></div>';
  h+='<div style="text-align:left"><label class="fl">Username</label><input id="login-user" type="text" class="fi" placeholder="username" autocapitalize="none" autocorrect="off"><label class="fl">Password</label><input id="login-pass" type="password" class="fi" placeholder="password"></div>';
  h+='<button class="subbtn" onclick="doLogin()">✅ เข้าสู่ระบบ ICU</button><button class="canbtn" onclick="closeOv()">ยกเลิก</button></div>';
  openOv(h);
}
function doLogin(){var u=(document.getElementById('login-user').value||'').trim();var p=(document.getElementById('login-pass').value||'').trim();var err=document.getElementById('login-err');if(u===ICU_USER&&p===ICU_PASS){isICU=true;closeOv();toast('✅ Login สำเร็จ');uA();renderAll();}else{err.textContent='❌ Username หรือ Password ไม่ถูกต้อง';}}
function uA(){document.getElementById('auth-area').innerHTML=isICU?'<div style="display:flex;gap:6px;align-items:center"><div style="background:rgba(255,255,255,.2);border:1px solid rgba(255,255,255,.3);border-radius:7px;padding:5px 10px;font-size:12px;color:white;font-weight:800">👩‍⚕️ ICU</div><button onclick="logout()" style="background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);color:white;border-radius:6px;padding:5px 8px;font-size:12px;cursor:pointer;font-family:Sarabun,sans-serif">ออก</button></div>':'<button class="hlbtn" onclick="showLogin()">🔐 Login</button>';}
function logout(){isICU=false;uA();renderAll();}

function showRules(){
  var rl=[['#2a9d8f','01','การจอง = ลงคิว ไม่ใช่การการันตีเตียง'],['#4db8ac','02','เรียงตามลำดับ First come, first served'],['#1a6b6b','03','ICU สามารถปรับคิวตามความเหมาะสม'],['#e9c46a','04','กรุณาโทรยืนยันเตียงเช้าวันผ่าตัด'],['#8a6a10','05','โควต้า Sx 6 เตียง ⬜ / Neuro Sx 2 เตียง 🟨'],['#c04040','ER','เคสฉุกเฉิน โทร 8504-8505']];
  var h='<div class="hdl"></div><div class="sp"><div style="background:linear-gradient(135deg,#1a6b6b,#2a9d8f);border-radius:14px;padding:16px;text-align:center;margin-bottom:14px"><div style="font-size:26px;margin-bottom:4px">📋</div><div style="color:white;font-weight:800;font-size:17px">กติกาการจองเตียง</div><div style="color:rgba(255,255,255,.8);font-size:12px;margin-top:3px">Contact: 8504-8505</div></div>';
  rl.forEach(function(r,i){h+='<div style="display:flex;gap:12px;align-items:center;padding:11px 0;border-bottom:'+(i<rl.length-1?'1px solid #edf7f6':'none')+'"><div style="width:40px;height:40px;border-radius:10px;background:'+r[0]+';display:flex;align-items:center;justify-content:center;color:white;font-weight:900;font-size:12px;flex-shrink:0">'+r[1]+'</div><div style="font-size:14px;color:#0d3a3a;font-weight:600">'+r[2]+'</div></div>';});
  h+='<button class="subbtn" style="margin-top:16px" onclick="closeOv()">ปิด</button></div>';
  openOv(h);
}

function setTab(t){document.getElementById('sec-bed').style.display=t==='bed'?'':'none';document.getElementById('sec-queue').style.display=t==='queue'?'':'none';document.getElementById('tt-bed').className='tab'+(t==='bed'?' on':'');document.getElementById('tt-queue').className='tab'+(t==='queue'?' on':'');}
function setFi(f,btn){fi=f;document.querySelectorAll('.fb').forEach(function(b){b.className='fb';});btn.className='fb on';renderQueues();}
function openOv(html){closeOv();var ov=document.createElement('div');ov.className='ov';ov.id='mainov';var sh=document.createElement('div');sh.className='sh';sh.innerHTML=html;ov.appendChild(sh);ov.addEventListener('click',function(e){if(e.target===ov)closeOv();});document.body.appendChild(ov);document.body.style.overflow='hidden';}
function closeOv(){var s=document.getElementById('mainov');if(s)s.remove();document.body.style.overflow='';}
function closeDet(){document.getElementById('detbg').style.display='none';document.getElementById('detsheet').style.transform='translateX(-50%) translateY(100%)';document.body.style.overflow='';}
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.className='toast s';setTimeout(function(){t.className='toast';},3000);}
</script>
