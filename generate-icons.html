<!DOCTYPE html>
<html>
<head><title>ICU Icon Generator</title></head>
<body style="font-family:sans-serif;padding:20px">
<h2>🏥 สร้าง Icon สำหรับ PWA</h2>
<p>กด Download แต่ละขนาด แล้วบันทึกไว้ในโฟลเดอร์ <code>icons/</code></p>
<canvas id="c192" width="192" height="192" style="display:none"></canvas>
<canvas id="c512" width="512" height="512" style="display:none"></canvas>
<br>
<button onclick="gen(192)" style="padding:10px 20px;margin:5px;font-size:14px;background:#0d4f4f;color:white;border:none;border-radius:8px;cursor:pointer">⬇️ Download icon-192.png</button>
<button onclick="gen(512)" style="padding:10px 20px;margin:5px;font-size:14px;background:#0d4f4f;color:white;border:none;border-radius:8px;cursor:pointer">⬇️ Download icon-512.png</button>
<div id="preview" style="margin-top:20px"></div>
<script>
function gen(size){
  var c=document.getElementById('c'+size);
  var ctx=c.getContext('2d');
  // background
  var grad=ctx.createLinearGradient(0,0,size,size);
  grad.addColorStop(0,'#0d4f4f');
  grad.addColorStop(1,'#2a9d8f');
  ctx.fillStyle=grad;
  ctx.roundRect(0,0,size,size,size*0.2);
  ctx.fill();
  // emoji
  ctx.font=size*0.55+'px serif';
  ctx.textAlign='center';
  ctx.textBaseline='middle';
  ctx.fillText('🏥',size/2,size/2);
  // download
  var a=document.createElement('a');
  a.download='icon-'+size+'.png';
  a.href=c.toDataURL('image/png');
  a.click();
  // preview
  var img=new Image();img.src=c.toDataURL();img.style.width='96px';img.style.borderRadius='16px';img.style.margin='8px';
  document.getElementById('preview').appendChild(img);
}
</script>
</body>
</html>
